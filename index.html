<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>関東 心霊スポット MAP</title>

  <!-- Leaflet.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    /* ─── リセット & ベース ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:     #0a0a0f;
      --bg-mid:      #12121a;
      --bg-card:     #1a1a26;
      --border:      rgba(180,160,255,0.15);
      --accent-red:  #ff3b3b;
      --accent-yel:  #ffc200;
      --accent-blu:  #3bb8ff;
      --accent-purp: #8f6fff;
      --text-main:   #e8e0ff;
      --text-sub:    #9990bb;
      --blood:       #8b0000;
      --glow-red:    0 0 12px rgba(255,59,59,0.7);
      --glow-yel:    0 0 12px rgba(255,194,0,0.7);
      --glow-blu:    0 0 12px rgba(59,184,255,0.7);
      --glow-purp:   0 0 18px rgba(143,111,255,0.5);
    }

    html, body {
      height: 100%;
      background: var(--bg-deep);
      color: var(--text-main);
      font-family: 'Noto Sans JP', sans-serif;
    }

    /* ─── レイアウト ─── */
    .app-wrapper {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── ヘッダー ─── */
    header {
      background: linear-gradient(135deg, #0d0010 0%, #0a0a0f 60%, #0f0008 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-shadow: 0 2px 30px rgba(0,0,0,0.8);
      position: relative;
      z-index: 1000;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(143,111,255,0.03) 3px,
        rgba(143,111,255,0.03) 4px
      );
      pointer-events: none;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .skull-icon {
      font-size: 2.2rem;
      filter: drop-shadow(var(--glow-purp));
      animation: pulse-skull 3s ease-in-out infinite;
    }

    @keyframes pulse-skull {
      0%, 100% { opacity: 1; filter: drop-shadow(0 0 8px rgba(143,111,255,0.4)); }
      50%       { opacity: 0.7; filter: drop-shadow(0 0 20px rgba(143,111,255,0.9)); }
    }

    .header-title {
      display: flex;
      flex-direction: column;
    }

    .title-main {
      font-family: 'Noto Serif JP', serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--text-main);
      text-shadow: 0 0 20px rgba(143,111,255,0.6), 0 0 40px rgba(143,111,255,0.3);
    }

    .title-sub {
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      color: var(--text-sub);
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ─── 凡例 ─── */
    .legend {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--text-sub);
      letter-spacing: 0.05em;
    }

    .legend-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
    }
    .dot-red  { background: var(--accent-red); box-shadow: var(--glow-red); }
    .dot-yel  { background: var(--accent-yel); box-shadow: var(--glow-yel); }
    .dot-blu  { background: var(--accent-blu); box-shadow: var(--glow-blu); }

    /* ─── メインコンテンツ ─── */
    .main-grid {
      display: grid;
      grid-template-columns: 310px 1fr;
      overflow: hidden;
    }

    /* ─── サイドパネル ─── */
    .side-panel {
      background: var(--bg-mid);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--text-sub);
      text-transform: uppercase;
    }

    /* フィルタ */
    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-sub);
      font-size: 0.7rem;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
    }
    .filter-btn:hover { border-color: var(--accent-purp); color: var(--text-main); }
    .filter-btn.active-all  { background: var(--accent-purp); color: #fff; border-color: var(--accent-purp); }
    .filter-btn.active-red  { background: var(--accent-red);  color: #fff; border-color: var(--accent-red); }
    .filter-btn.active-yel  { background: var(--accent-yel);  color: #000; border-color: var(--accent-yel); }
    .filter-btn.active-blu  { background: var(--accent-blu);  color: #000; border-color: var(--accent-blu); }

    /* スポットリスト */
    .spot-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .spot-list::-webkit-scrollbar { width: 4px; }
    .spot-list::-webkit-scrollbar-track { background: transparent; }
    .spot-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .spot-card {
      padding: 11px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .spot-card:hover    { background: rgba(143,111,255,0.08); }
    .spot-card.selected { background: rgba(143,111,255,0.15); }

    .card-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .card-info { flex: 1; min-width: 0; }

    .card-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      display: flex;
      gap: 8px;
      margin-top: 3px;
      align-items: center;
    }

    .card-pref {
      font-size: 0.65rem;
      color: var(--text-sub);
      letter-spacing: 0.05em;
    }

    .danger-badge {
      font-size: 0.6rem;
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .badge-red { background: rgba(255,59,59,0.2); color: var(--accent-red); border: 1px solid rgba(255,59,59,0.4); }
    .badge-yel { background: rgba(255,194,0,0.2); color: var(--accent-yel); border: 1px solid rgba(255,194,0,0.4); }
    .badge-blu { background: rgba(59,184,255,0.2); color: var(--accent-blu); border: 1px solid rgba(59,184,255,0.4); }
    /* ─── マップラッパー ─── */
    #map-wrap {
      position: relative;
      background: #0a0a0f;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* ─── ポップアップ ─── */
    .leaflet-popup-content-wrapper {
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8) !important;
      color: var(--text-main) !important;
    }
    .leaflet-popup-tip { background: var(--bg-card) !important; }
    .leaflet-popup-content { margin: 0 !important; padding: 0 !important; }
    .leaflet-popup-close-button { color: var(--text-sub) !important; font-size: 1.1rem !important; }

    .popup-inner { padding: 16px 18px; min-width: 220px; max-width: 280px; }

    .popup-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .popup-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .popup-name {
      font-family: 'Noto Serif JP', serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.3;
    }

    .popup-section {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--text-sub);
      border-top: 1px solid var(--border);
      padding-top: 8px;
      margin-top: 8px;
      text-transform: uppercase;
    }

    .popup-desc {
      font-size: 0.78rem;
      color: var(--text-sub);
      line-height: 1.7;
      margin-top: 6px;
    }

    .popup-danger {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
    }

    .danger-bar-wrap {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .danger-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* ─── Leaflet オーバーライド ─── */
    .leaflet-container { background: #0e0e16 !important; }

    .leaflet-control-zoom a {
      background: var(--bg-card) !important;
      color: var(--text-main) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--bg-mid) !important; }

    .leaflet-control-attribution {
      background: rgba(10,10,15,0.8) !important;
      color: var(--text-sub) !important;
      font-size: 0.6rem !important;
    }
    .leaflet-control-attribution a { color: var(--accent-purp) !important; }

    /* ─── カスタムマーカー ─── */
    .custom-marker {
      width: 28px;
      height: 28px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .custom-marker::after {
      content: '👻';
      transform: rotate(45deg);
      font-size: 13px;
      display: block;
    }

    /* ─── フッター情報 ─── */
    .map-overlay-info {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(10,10,15,0.85);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.65rem;
      color: var(--text-sub);
      backdrop-filter: blur(8px);
      z-index: 500;
      line-height: 1.8;
    }

    /* ─── レスポンシブ ─── */
    @media (max-width: 768px) {
      .main-grid { grid-template-columns: 1fr; grid-template-rows: 240px 1fr; }
      .side-panel { border-right: none; border-bottom: 1px solid var(--border); }
      .spot-list  { display: flex; flex-direction: row; overflow-x: auto; overflow-y: hidden; padding: 4px 8px; }
      .spot-card  { min-width: 180px; border-bottom: none; border-right: 1px solid rgba(255,255,255,0.04); }
      .title-main { font-size: 1.1rem; }
      .legend     { display: none; }
    }
  </style>
</head>
<body>
<div class="app-wrapper">

  <!-- ヘッダー -->
  <header>
    <div class="header-left">
      <span class="skull-icon"></span>
      <div class="header-title">
        <span class="title-main">関東 心霊スポット MAP</span>
        <span class="title-sub">Kanto Haunted Locations — GIS Edition</span>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot dot-red"></div>危険度：高
      </div>
      <div class="legend-item">
        <div class="legend-dot dot-yel"></div>危険度：中
      </div>
      <div class="legend-item">
        <div class="legend-dot dot-blu"></div>危険度：低
      </div>
    </div>
  </header>

  <!-- メインエリア -->
  <div class="main-grid">

    <!-- サイドパネル -->
    <aside class="side-panel">
      <div class="panel-header">📍 スポット一覧 &nbsp;<span id="spot-count"></span></div>
      <div class="filter-bar">
        <button class="filter-btn active-all" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="red">🔴 高危険</button>
        <button class="filter-btn" data-filter="yellow">🟡 中危険</button>
        <button class="filter-btn" data-filter="blue">🔵 低危険</button>
      </div>
      <div class="spot-list" id="spot-list"></div>
    </aside>

    <!-- 地図 -->
    <div id="map-wrap">
      <div id="map"></div>
      <div class="map-overlay-info">
        ⚠ 掲載スポットへの無断侵入は違法です<br>
        私有地・立入禁止区域には入らないでください
      </div>
    </div>
  </div>
</div>

// 1. データ定義
// ─────────────────────────────────────────────

// 2. カラー設定
// ─────────────────────────────────────────────

  red:    { hex: '#ff3b3b', glow: 'rgba(255,59,59,0.6)',  label: '高危険', badgeClass: 'badge-red' },
  yellow: { hex: '#ffc200', glow: 'rgba(255,194,0,0.6)',  label: '中危険', badgeClass: 'badge-yel' },

// ─────────────────────────────────────────────
// 3. Leaflet 地図初期化
// ─────────────────────────────────────────────
const map = L.map('map', {
  center: [35.85, 139.20],
  zoom: 9,
  zoomControl: true,
  preferCanvas: true
});

// タイル：CartoDB Dark Matter（ダークテーマに最適）
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// ─────────────────────────────────────────────
// 4. カスタムマーカー生成
// ─────────────────────────────────────────────
function createMarkerIcon(colorKey) {
  const c = COLOR_MAP[colorKey];
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="44" viewBox="0 0 36 44">
      <defs>
        <filter id="glow-${colorKey}">
          <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <path d="M18 2 C9 2 2 9 2 18 C2 28 18 42 18 42 C18 42 34 28 34 18 C34 9 27 2 18 2 Z"
            fill="${c.hex}" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"
            filter="url(#glow-${colorKey})" opacity="0.95"/>
      <circle cx="18" cy="18" r="8" fill="rgba(0,0,0,0.5)"/>
      <text x="18" y="22" text-anchor="middle" font-size="11" fill="white"></text>
    </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [36, 44],
    iconAnchor: [18, 44],
    popupAnchor: [0, -46]
  });
}

// ─────────────────────────────────────────────
// 5. マーカー & ポップアップ配置
// ─────────────────────────────────────────────
const markers = {};

SPOTS.forEach(spot => {
  const c = COLOR_MAP[spot.color];
  const icon = createMarkerIcon(spot.color);
  const marker = L.marker([spot.lat, spot.lng], { icon }).addTo(map);

  const barColor = spot.color === 'red' ? '#ff3b3b' : spot.color === 'yellow' ? '#ffc200' : '#3bb8ff';
  const popupHTML = `
    <div class="popup-inner">
      <div class="popup-header">
        <div class="popup-dot" style="background:${c.hex}; box-shadow: 0 0 8px ${c.glow};"></div>
        <span class="popup-name">${spot.name}</span>
      </div>
      <div style="font-size:0.7rem; color: var(--text-sub); margin-bottom:6px;">📍 ${spot.pref}</div>
      <div class="popup-section">概要</div>
      <p class="popup-desc">${spot.desc}</p>
      <div class="popup-danger">
        <span style="font-size:0.7rem; color:var(--text-sub); white-space:nowrap;">危険度</span>
        <div class="danger-bar-wrap">
          <div class="danger-bar-fill" style="width:${spot.level}%; background:${barColor};"></div>
        </div>
        <span style="font-size:0.72rem; color:${barColor}; font-weight:700; white-space:nowrap;">${spot.level}%</span>
      </div>
    </div>`;

  marker.bindPopup(popupHTML, { maxWidth: 290, minWidth: 240 });
  markers[spot.id] = marker;

  marker.on('click', () => selectSpot(spot.id));
});

// ─────────────────────────────────────────────
// 6. サイドリスト描画
// ─────────────────────────────────────────────
function renderList(filter) {
  const list = document.getElementById('spot-list');
  list.innerHTML = '';
  const filtered = filter === 'all' ? SPOTS : SPOTS.filter(s => s.color === filter);

  document.getElementById('spot-count').textContent = `${filtered.length}件`;

  filtered.forEach(spot => {
    const c = COLOR_MAP[spot.color];
    const card = document.createElement('div');
    card.className = 'spot-card';
    card.dataset.id = spot.id;
    card.innerHTML = `
      <div class="card-dot" style="background:${c.hex}; box-shadow: 0 0 6px ${c.glow};"></div>
      <div class="card-info">
        <div class="card-name">${spot.name}</div>
        <div class="card-meta">
          <span class="card-pref">${spot.pref}</span>
          <span class="danger-badge ${c.badgeClass}">${c.label}</span>
        </div>
      </div>`;
    card.addEventListener('click', () => selectSpot(spot.id));
    list.appendChild(card);
  });
}

// ─────────────────────────────────────────────
// 7. スポット選択
// ─────────────────────────────────────────────
let selectedId = null;

function selectSpot(id) {
  const spot = SPOTS.find(s => s.id === id);
  if (!spot) return;

  // リストハイライト
  document.querySelectorAll('.spot-card').forEach(el => el.classList.remove('selected'));
  const card = document.querySelector(`.spot-card[data-id="${id}"]`);
  if (card) { card.classList.add('selected'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

  // 地図フライ & ポップアップ
  map.flyTo([spot.lat, spot.lng], 13, { duration: 1.2 });
  setTimeout(() => markers[id].openPopup(), 1300);
  selectedId = id;
}

// ─────────────────────────────────────────────
// 8. フィルタボタン
// ─────────────────────────────────────────────
let currentFilter = 'all';

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter;
    currentFilter = f;

    // ボタンアクティブ状態
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = 'filter-btn';
    });
    if (f === 'all')         btn.classList.add('active-all');
    else if (f === 'red')    btn.classList.add('active-red');
    else if (f === 'yellow') btn.classList.add('active-yel');
    else if (f === 'blue')   btn.classList.add('active-blu');

    // マーカー表示/非表示
    SPOTS.forEach(spot => {
      const m = markers[spot.id];
      if (f === 'all' || spot.color === f) {
        if (!map.hasLayer(m)) map.addLayer(m);
      } else {
        if (map.hasLayer(m)) map.removeLayer(m);
      }
    });

    renderList(f);
  });
});

// ─────────────────────────────────────────────
// 9. 初期描画
// ─────────────────────────────────────────────
renderList('all');
document.getElementById('spot-count').textContent = `${SPOTS.length}件`;
</script>
</body>
</html>
